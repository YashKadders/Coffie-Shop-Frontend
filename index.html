<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brew Haven - Liquid Design</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <div class="container">
        
        <header class="glass-panel">
            <h1>Brew Haven</h1>
            <nav>
                <a href="#about">About</a>
                <a href="#menu">Menu</a>
                <a href="#contact">Contact</a>
            </nav>
        </header>

        <section class="hero glass-panel">
            <h2>Crafted Coffee,<br>Crafted Moments</h2>
            <p>Premium coffee made from ethically sourced beans.</p>
            <button class="action-btn">Order Now</button>
        </section>

        <section id="about" class="glass-panel">
            <h2>About Us</h2>
            <p>A unique coffee experience for creators, dreamers, and coffee lovers.</p>
        </section>

        <section id="menu" class="glass-panel">
            <h2>Signature Drinks</h2>
            <div class="menu-grid">
                <div class="glass-pill">Caramel Cloud Latte</div>
                <div class="glass-pill">Vanilla Cold Brew</div>
                <div class="glass-pill">Hazelnut Mocha</div>
            </div>
        </section>

        <section id="contact" class="glass-panel">
            <h2>Contact</h2>
            <p>Ahmedabad, India</p>
        </section>

    </div>

</body>
</html>
