<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brew Haven - 3D Gemstone Design</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    
    <header>
        <h1>Brew Haven</h1>
        <nav>
            <a href="#about">About</a>
            <a href="#menu">Menu</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <div class="card-wrapper hero-wrapper">
        <div class="card-content hero-content">
            <h2>Crafted Coffee,<br>Crafted Moments</h2>
            <p>Premium coffee made from ethically sourced beans.</p>
            <button>Order Now</button>
        </div>
    </div>

    <div class="card-wrapper about-wrapper" id="about">
        <div class="card-content about-content dark-text">
            <h2>About Us</h2>
            <p>A unique coffee experience for creators, dreamers, and coffee lovers.</p>
        </div>
    </div>

    <div class="card-wrapper menu-wrapper" id="menu">
        <div class="card-content menu-content">
            <h2>Signature Drinks</h2>
            <div id="menu-items">
                <div class="gem-pill gem-amber">Caramel Cloud Latte</div>
                <div class="gem-pill gem-frost">Vanilla Cold Brew</div>
                <div class="gem-pill gem-choco">Hazelnut Mocha</div>
            </div>
        </div>
    </div>

    <div class="card-wrapper contact-wrapper" id="contact">
        <div class="card-content contact-content dark-text">
            <h2>Contact</h2>
            <p>Ahmedabad, India <span class="pin-icon"></span></p>
        </div>
    </div>

</div>

</body>
</html>
